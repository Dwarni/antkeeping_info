{% load humanize %}
<div class="row align-items-center mb-1 g-2">
    <div class="col-5 col-md-4 text-truncate">
        <small class="text-muted">{{ index }}.</small> <strong>{{ entry_name }}</strong>
    </div>
    <div class="col">
        <div class="progress" style="height: 1.25rem;" role="progressbar"
             aria-valuenow="{{ width|floatformat:0 }}" aria-valuemin="0" aria-valuemax="100">
            <div class="progress-bar" style="width: {{ width }}%"></div>
        </div>
    </div>
    <div class="col-auto text-end" style="min-width: 4rem;">
        {{ entry_total|intcomma }}
    </div>
</div>
