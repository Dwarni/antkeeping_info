{% extends "layout.html" %}
{% load i18n %}
{% block title %}Login Error — Antkeeping.info{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <i class="bi bi-exclamation-circle fs-1 text-danger mb-3 d-block"></i>
        <h2>{% trans "Third-Party Login Failure" %}</h2>
        <p class="mt-3">{% trans "An error occurred while attempting to login via your third-party account." %}</p>
        <a href="{% url 'account_login' %}" class="btn btn-primary mt-2">{% trans "Back to Login" %}</a>
    </div>
</div>
{% endblock %}
