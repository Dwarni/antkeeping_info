{% extends "layout.html" %}
{% load i18n %}
{% block title %}Password Changed — Antkeeping.info{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <i class="bi bi-check-circle fs-1 text-success mb-3 d-block"></i>
        <h2>{% trans "Password Changed" %}</h2>
        <p class="mt-3">{% trans "Your password has been changed successfully." %}</p>
        <a href="{% url 'account_login' %}" class="btn btn-primary mt-2">
            {% trans "Sign In" %}
        </a>
    </div>
</div>
{% endblock %}
