{% extends "layout.html" %}
{% load i18n crispy_forms_tags %}
{% block title %}Change Password — Antkeeping.info{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <h2 class="mb-3">{% trans "Change Password" %}</h2>
        <form method="post" action="{% url 'account_change_password' %}">
            {% csrf_token %}
            {{ redirect_field }}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary w-100">{% trans "Change Password" %}</button>
        </form>
        <div class="mt-3 text-center">
            <a href="{% url 'account_reset_password' %}">{% trans "Forgot your current password?" %}</a>
        </div>
    </div>
</div>
{% endblock %}
